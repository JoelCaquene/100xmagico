{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>100xmagico - A Sorte Oriental</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Great+Vibes&family=Noto+Sans+SC:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --gold: #ffd700;
            --dragon-red: #d90429;
            --deep-red: #800000;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            margin: 0; padding: 0; width: 100%; min-height: 100vh;
            overflow-x: hidden;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at center, #ff0000 0%, #4a0000 100%);
        }

        #bg-animation {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
            background: url('https://www.transparenttextures.com/patterns/chinese-lanterns.png');
            opacity: 0.2; animation: moveBg 60s linear infinite;
        }

        @keyframes moveBg { from { background-position: 0 0; } to { background-position: 1000px 1000px; } }

        /* TELA DE CARREGAMENTO */
        #magic-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, #d90429, #4a0000);
            z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white;
            display: none;
        }

        .loader-circle {
            width: 100px; height: 100px; border: 5px solid rgba(255,215,0,0.2);
            border-top: 5px solid var(--gold); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }

        .counter-text { font-size: 3.5rem; font-weight: bold; color: var(--gold); }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* HEADER & LANG SELECTOR CORRIGIDO */
        .top-nav {
            width: 100%; display: flex; justify-content: space-between;
            align-items: center; padding: 15px 20px; z-index: 10;
        }

        .logo-100xmagico {
            font-family: 'Great Vibes', cursive; font-size: 32px; 
            color: var(--gold); text-shadow: 0 0 10px #ff0000;
        }

        .lang-container {
            background: var(--gold); /* Fundo dourado para contraste */
            border-radius: 20px; padding: 5px 12px; display: flex; align-items: center; gap: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        .lang-container i { color: #000; font-size: 0.9rem; }

        .lang-container select {
            background: transparent; border: none; 
            color: #000; /* TEXTO PRETO COMO PEDIDO */
            font-size: 0.85rem; font-weight: 800; outline: none; cursor: pointer;
        }

        .lang-container select option {
            color: #000; /* OPÇÕES PRETAS */
            background: #fff; 
        }

        /* CONTAINER FORM */
        .register-container {
            position: relative; z-index: 5; margin: 10px auto 100px;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px);
            padding: 30px 20px; border-radius: 20px; width: 92%; max-width: 400px;
            border: 1.5px solid var(--gold); box-shadow: 0 0 20px rgba(217, 4, 41, 0.5);
            text-align: center; transition: opacity 0.5s;
        }

        h2 {
            font-family: 'Noto Sans SC', sans-serif; color: var(--gold);
            font-size: 1.8rem; margin-bottom: 20px; text-transform: uppercase;
        }

        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label {
            font-size: 0.7rem; font-weight: 700; color: var(--gold);
            margin-left: 10px; display: block; margin-bottom: 4px;
        }

        .input-wrapper { position: relative; display: flex; align-items: center; }

        .auth-form input {
            width: 100%; padding: 14px 15px 14px 45px;
            border: 1px solid rgba(255,215,0,0.3); border-radius: 12px;
            background: rgba(255, 255, 255, 0.05); color: #fff; font-size: 0.95rem;
        }

        .input-wrapper i.main-icon { position: absolute; left: 15px; color: var(--gold); }

        .country-select {
            position: absolute; left: 8px; display: flex; align-items: center;
            border-right: 1px solid var(--gold); padding-right: 5px; height: 60%;
        }

        .country-select select { background: transparent; border: none; color: white; outline: none; font-weight: bold; }
        .country-select select option { color: #000; background: #fff; }

        .phone-input { padding-left: 85px !important; }
        .toggle-password { position: absolute; right: 15px; cursor: pointer; color: var(--gold); }

        /* NAV BAIXO */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 75px;
            background: #111; display: flex; justify-content: space-around;
            align-items: center; border-top: 2px solid var(--gold); z-index: 100;
        }

        .nav-item {
            text-decoration: none; color: #888; display: flex;
            flex-direction: column; align-items: center; font-size: 0.7rem;
            flex: 1; border: none; background: none; cursor: pointer; font-weight: bold;
        }

        .nav-item i { font-size: 1.4rem; margin-bottom: 4px; }
        .nav-item.active { color: var(--gold); }

        .policy-container {
            display: flex; align-items: center; gap: 8px; color: #ccc;
            font-size: 0.7rem; margin-top: 15px; text-align: left;
        }

        .casino-light {
            position: fixed; width: 2px; height: 2px; background: white;
            border-radius: 50%; box-shadow: 0 0 8px 1px gold;
            animation: float 8s infinite; opacity: 0.6; z-index: 1;
        }

        @keyframes float { 0% { transform: translateY(100vh); opacity: 1; } 100% { transform: translateY(-10vh); opacity: 0; } }
    </style>
</head>
<body>

    <div id="bg-animation"></div>

    <div id="magic-loader">
        <div class="loader-circle"></div>
        <div class="counter-text" id="count-up">0</div>
        <div style="font-family: 'Great Vibes', cursive; color: var(--gold); font-size: 1.5rem; margin-top: 10px;">100xmagico</div>
    </div>

    <nav class="top-nav">
        <div class="logo-100xmagico">100xmagico</div>
        <div class="lang-container">
            <i class="fa-solid fa-language"></i>
            <select id="lang-selector" onchange="changeLanguage()">
                <option value="pt">PT</option>
                <option value="en">EN</option>
                <option value="es">ES</option>
                <option value="zh">ZH</option>
                <option value="ar">AR</option>
                <option value="fr">FR</option>
                <option value="ru">RU</option>
                <option value="jp">JP</option>
                <option value="de">DE</option>
                <option value="it">IT</option>
            </select>
        </div>
    </nav>

    <div class="register-container" id="form-box">
        <h2 id="txt-title">Cadastro Real</h2>
        
        <form method="post" class="auth-form" id="main-form">
            {% csrf_token %}
            <div class="form-group">
                <label id="lbl-phone">TELEFONE DA SORTE</label>
                <div class="input-wrapper">
                    <div class="country-select">
                        <select name="ddi">
                            <option value="+55">🇧🇷</option>
                            <option value="+351">🇵🇹</option>
                            <option value="+244">🇦🇴</option>
                            <option value="+34">🇪🇸</option>
                            <option value="+1">🇨🇦</option>
                            <option value="+33">🇫🇷</option>
                            <option value="+86">🇨🇳</option>
                            <option value="+971">🇦🇪</option>
                            <option value="+7">🇷🇺</option>
                            <option value="+81">🇯🇵</option>
                        </select>
                    </div>
                    <input type="text" name="phone_number" id="input-phone" class="phone-input" placeholder="Seu número" required>
                </div>
            </div>

            <div class="form-group">
                <label id="lbl-pass">SENHA MÁGICA</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock main-icon"></i>
                    <input type="password" name="password" id="pass" placeholder="******" required>
                    <i class="fa-solid fa-eye toggle-password" onclick="togglePass('pass')"></i>
                </div>
            </div>

            <div class="form-group">
                <label id="lbl-confirm">CONFIRMAR SORTE</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-circle-check main-icon"></i>
                    <input type="password" name="confirm_password" id="conf" placeholder="******" required>
                    <i class="fa-solid fa-eye toggle-password" onclick="togglePass('conf')"></i>
                </div>
            </div>

            <div class="form-group">
                <label id="lbl-invite">CÓDIGO VIP</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-crown main-icon"></i>
                    <input type="text" id="invite_code" name="invited_by_code" placeholder="Opcional" value="{{ request.GET.invite|default:'' }}">
                </div>
            </div>

            <label class="policy-container">
                <input type="checkbox" id="policy-check" required>
                <span id="txt-policy">Sou maior de 18 anos e aceito os termos.</span>
            </label>
        </form>
    </div>

    <div class="bottom-nav">
        <a href="{% url 'login' %}" class="nav-item">
            <i class="fa-solid fa-door-open"></i>
            <span id="nav-login">ENTRAR</span>
        </a>

        <button type="button" onclick="startSubmitAnimation()" class="nav-item active">
            <i class="fa-solid fa-dragon"></i>
            <span id="nav-reg">REGISTRAR</span>
        </button>
    </div>

    <script>
        const translations = {
            pt: { title: "Cadastro Real", phone: "TELEFONE DA SORTE", pass: "SENHA MÁGICA", confirm: "CONFIRMAR SORTE", invite: "CÓDIGO VIP", policy: "Sou maior de 18 anos e aceito os termos.", login: "ENTRAR", reg: "REGISTRAR", holder: "Seu número" },
            en: { title: "Royal Register", phone: "LUCKY PHONE", pass: "MAGIC PASSWORD", confirm: "CONFIRM LUCK", invite: "VIP CODE", policy: "I am 18+ and accept the terms.", login: "LOGIN", reg: "REGISTER", holder: "Your number" },
            es: { title: "Registro Real", phone: "TELÉFONO SUERTE", pass: "CLAVE MÁGICA", confirm: "CONFIRMAR SUERTE", invite: "CÓDIGO VIP", policy: "Soy mayor de 18 y acepto términos.", login: "ENTRAR", reg: "REGISTRAR", holder: "Tu número" },
            zh: { title: "皇家注册", phone: "幸运电话", pass: "魔法密码", confirm: "确认幸运", invite: "VIP代码", policy: "我已年满18岁并接受条款", login: "登录", reg: "注册", holder: "你的号码" },
            ar: { title: "سجل ملكي", phone: "هاتف الحظ", pass: "كلمة السر", confirm: "تأكيد الحظ", invite: "كود VIP", policy: "أنا 18+ وأقبل الشروط", login: "تسجيل الدخول", reg: "سجل", holder: "رقمك" },
            fr: { title: "Inscription Royale", phone: "TÉLÉPHONE CHANCE", pass: "MOT DE PASSE", confirm: "CONFIRMER CHANCE", invite: "CODE VIP", policy: "J'ai 18 ans+ et j'accepte.", login: "ENTRER", reg: "S'INSCRIRE", holder: "Votre número" },
            ru: { title: "Регистрация", phone: "ТЕЛЕФОН УДАЧИ", pass: "МАГИЧЕСКИЙ ПАРОЛЬ", confirm: "ПОДТВЕРДИТЬ", invite: "VIP КОД", policy: "Мне 18+ и я согласен.", login: "ВОЙТИ", reg: "СОЗДАТЬ", holder: "Ваш номер" },
            jp: { title: "ロイヤル登録", phone: "ラッキー電話", pass: "魔法のパスワード", confirm: "幸運を確認", invite: "VIPコード", policy: "18歳以上で規約に同意します", login: "ログイン", reg: "登録", holder: "電話番号" },
            de: { title: "Königliche Reg.", phone: "GLÜCKSTELEFON", pass: "PASSWORT", confirm: "BESTÄTIGEN", invite: "VIP CODE", policy: "Ich bin 18+ und stimme zu.", login: "LOGIN", reg: "REGISTRIEREN", holder: "Ihre Nummer" },
            it: { title: "Registro Reale", phone: "TELEFONO FORTUNA", pass: "PASSWORD", confirm: "CONFERMA", invite: "CODICE VIP", policy: "Ho 18+ e accetto i termini.", login: "ACCEDI", reg: "REGISTRATI", holder: "Tuo numero" }
        };

        function changeLanguage() {
            const lang = document.getElementById('lang-selector').value;
            const t = translations[lang];
            document.getElementById('txt-title').innerText = t.title;
            document.getElementById('lbl-phone').innerText = t.phone;
            document.getElementById('lbl-pass').innerText = t.pass;
            document.getElementById('lbl-confirm').innerText = t.confirm;
            document.getElementById('lbl-invite').innerText = t.invite;
            document.getElementById('txt-policy').innerText = t.policy;
            document.getElementById('nav-login').innerText = t.login;
            document.getElementById('nav-reg').innerText = t.reg;
            document.getElementById('input-phone').placeholder = t.holder;
            document.dir = (lang === 'ar') ? 'rtl' : 'ltr';
        }

        function runCounter(callback) {
            const loader = document.getElementById('magic-loader');
            const counter = document.getElementById('count-up');
            loader.style.display = 'flex';
            let count = 0;
            const interval = setInterval(() => {
                count += 2;
                counter.innerText = count;
                if (count >= 100) {
                    clearInterval(interval);
                    if(callback) callback();
                }
            }, 25);
        }

        window.onload = function() {
            runCounter(() => { document.getElementById('magic-loader').style.display = 'none'; });
            for (let i = 0; i < 15; i++) {
                let spark = document.createElement('div');
                spark.className = 'casino-light';
                spark.style.left = Math.random() * 100 + 'vw';
                spark.style.animationDuration = (Math.random() * 5 + 3) + 's';
                document.body.appendChild(spark);
            }
        };

        function startSubmitAnimation() {
            const form = document.getElementById('main-form');
            if (form.reportValidity()) {
                document.getElementById('form-box').style.opacity = '0';
                runCounter(() => {
                    form.submit();
                });
            }
        }

        function togglePass(id) {
            const input = document.getElementById(id);
            const icon = input.nextElementSibling;
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            }
        }
    </script>
</body>
</html>
