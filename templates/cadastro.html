{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Criar Conta - Ariel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Great+Vibes&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --ariel-teal: #20b2aa;
            --ariel-pink: #ff85a2;
            --ariel-gold: #ffd700;
            --ariel-purple: #9370db;
            --glass-white: rgba(255, 255, 255, 0.95);
        }

        html, body {
            margin: 0; padding: 0; width: 100%; min-height: 100vh;
            overflow-x: hidden; position: relative;
        }

        body {
            font-family: 'Poppins', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            background: linear-gradient(135deg, #a1887f 0%, #ff85a2 20%, #20b2aa 100%);
            background-attachment: fixed;
            color: #333;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle, #fff 1px, transparent 1px);
            background-size: 50px 50px; opacity: 0.3; z-index: 0; pointer-events: none;
        }

        .top-nav {
            width: 100%; display: flex; justify-content: space-between;
            align-items: center; padding: 15px 20px; box-sizing: border-box; z-index: 10;
        }

        .logo-ariel {
            font-family: 'Great Vibes', cursive; font-size: 35px; color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .language-selector {
            background: var(--glass-white); padding: 5px 12px; border-radius: 20px;
            display: flex; align-items: center; gap: 8px; border: 2px solid var(--ariel-pink);
        }

        .language-selector select {
            border: none; background: transparent; font-weight: 700;
            color: var(--ariel-teal); outline: none; cursor: pointer; font-size: 0.9rem;
        }

        .register-container {
            position: relative; z-index: 5; margin-top: 10px; margin-bottom: 120px;
            background: var(--glass-white); padding: 30px 20px; border-radius: 30px;
            width: 92%; max-width: 420px; box-shadow: 0 15px 35px rgba(255, 133, 162, 0.4);
            border: 3px solid white; text-align: center; box-sizing: border-box;
        }

        .register-container::after {
            content: "👑"; position: absolute; top: -25px; left: 50%;
            transform: translateX(-50%); font-size: 40px;
        }

        h2 {
            font-family: 'Great Vibes', cursive; font-size: 2.5rem;
            margin-bottom: 20px; color: var(--ariel-teal);
        }

        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label {
            font-size: 0.7rem; font-weight: 700; margin-left: 10px;
            display: block; color: var(--ariel-purple); text-transform: uppercase;
        }

        .input-wrapper { position: relative; display: flex; align-items: center; }

        .country-select {
            position: absolute; left: 10px; display: flex; align-items: center;
            border-right: 1px solid #eee; padding-right: 5px; height: 100%;
        }

        .country-select select {
            background: transparent; border: none; font-size: 0.85rem;
            font-weight: 600; outline: none; cursor: pointer; color: var(--ariel-teal);
        }

        .input-wrapper i.main-icon {
            position: absolute; left: 15px; color: var(--ariel-teal); font-size: 1rem;
        }

        .auth-form input {
            width: 100%; padding: 14px 15px 14px 45px; border: 2px solid #ffdae3;
            border-radius: 25px; background: #fff; font-size: 0.95rem;
            outline: none; box-sizing: border-box; transition: 0.3s;
        }

        .phone-input { padding-left: 85px !important; }

        .toggle-password {
            position: absolute; right: 15px; cursor: pointer; color: #ccc;
        }

        /* BARRA INFERIOR SEM SAQUE */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 75px;
            background: white; display: flex; justify-content: space-around;
            align-items: center; border-top: 3px solid var(--ariel-pink);
            z-index: 100; box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
        }

        .nav-item {
            text-decoration: none; color: #888; display: flex;
            flex-direction: column; align-items: center; font-size: 0.75rem; font-weight: 700;
            flex: 1; transition: 0.3s; cursor: pointer; border: none; background: none;
        }

        .nav-item i { font-size: 1.5rem; margin-bottom: 4px; }
        .nav-item.active { color: var(--ariel-teal); }

        .policy-container {
            display: flex; gap: 10px; margin: 15px 5px; text-align: left; font-size: 0.75rem;
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="logo-ariel">Ariel</div>
        <div class="language-selector">
            <i class="fa-solid fa-globe"></i>
            <select id="langSelect" onchange="translatePage(this.value)">
                <option value="pt">PT</option>
                <option value="en">EN</option>
                <option value="es">ES</option>
                <option value="fr">FR</option>
                <option value="ar">AR</option>
                <option value="zh">ZH</option>
            </select>
        </div>
    </nav>

    <div class="register-container">
        <h2 id="txt-title">Criar Conta</h2>
        
        <form method="post" class="auth-form" id="main-form">
            {% csrf_token %}

            <div class="form-group">
                <label id="lbl-phone">TELEFONE MÁGICO</label>
                <div class="input-wrapper">
                    <div class="country-select">
                        <select name="ddi">
                            <option value="+244">🇦🇴</option>
                            <option value="+55">🇧🇷</option>
                            <option value="+351">🇵🇹</option>
                            <option value="+238">🇨🇻</option>
                            <option value="+258">🇲🇿</option>
                            <option value="+239">🇸🇹</option>
                        </select>
                    </div>
                    <input type="text" name="phone_number" class="phone-input" placeholder="9xx xxx xxx" required>
                </div>
            </div>

            <div class="form-group">
                <label id="lbl-pass">SENHA SECRETA</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-wand-sparkles main-icon"></i>
                    <input type="password" name="password" id="pass" placeholder="******" required>
                    <i class="fa-solid fa-eye toggle-password" onclick="togglePass('pass')"></i>
                </div>
            </div>

            <div class="form-group">
                <label id="lbl-confirm">CONFIRME A MAGIA</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-gem main-icon"></i>
                    <input type="password" name="confirm_password" id="conf" placeholder="******" required>
                    <i class="fa-solid fa-eye toggle-password" onclick="togglePass('conf')"></i>
                </div>
            </div>

            <div class="form-group">
                <label id="lbl-invite">CÓDIGO DE CONVITE</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-crown main-icon"></i>
                    <input type="text" id="invite_code" name="invited_by_code" placeholder="..." value="{{ request.GET.invite|default:'' }}">
                </div>
            </div>

            <label class="policy-container">
                <input type="checkbox" id="policy-check" required>
                <span id="txt-policy">Aceito os Termos da Realeza Ariel.</span>
            </label>
        </form>
    </div>

    <div class="bottom-nav">
        <a href="{% url 'login' %}" class="nav-item">
            <i class="fa-solid fa-right-to-bracket"></i>
            <span id="nav-login">ENTRAR</span>
        </a>

        <button type="button" onclick="submitRegister()" class="nav-item active">
            <i class="fa-solid fa-user-plus"></i>
            <span id="nav-reg">CRIAR CONTA</span>
        </button>
    </div>

    <script>
        function togglePass(id) {
            const input = document.getElementById(id);
            const icon = input.nextElementSibling;
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            }
        }

        // Função para disparar o envio do formulário pelo botão do rodapé
        function submitRegister() {
            const form = document.getElementById('main-form');
            if (form.reportValidity()) {
                form.submit();
            }
        }

        const translations = {
            pt: { title: "Criar Conta", phone: "Telefone Mágico", pass: "Senha Secreta", confirm: "Confirme a Magia", invite: "Código de Convite", policy: "Aceito os Termos da Realeza Ariel.", login: "ENTRAR", reg: "CRIAR CONTA" },
            en: { title: "Create Account", phone: "Magic Phone", pass: "Secret Password", confirm: "Confirm Magic", invite: "Invite Code", policy: "I accept Ariel's Royal Terms.", login: "LOGIN", reg: "REGISTER" },
            es: { title: "Crear Cuenta", phone: "Teléfono Mágico", pass: "Contraseña Secreta", confirm: "Confirmar Magia", invite: "Código de Invitación", policy: "Acepto los Térmos de Ariel.", login: "ENTRAR", reg: "REGISTRO" },
            fr: { title: "Créer un Compte", phone: "Téléphone Magique", pass: "Mot de Passe", confirm: "Confirmer la Magie", invite: "Code d'Invitation", policy: "J'accepte les conditions d'Ariel.", login: "CONNEXION", reg: "S'INSCRIRE" },
            ar: { title: "إنشاء حساب", phone: "الهاتف السحري", pass: "كلمة المرور", confirm: "تأكيد السحر", invite: "رمز الدعوة", policy: "أنا أقبل الشروط الملكية", login: "تسجيل الدخول", reg: "تسجيل" },
            zh: { title: "创建账号", phone: "魔法电话", pass: "秘密密码", confirm: "确认魔法", invite: "邀请码", policy: "我接受条款", login: "登录", reg: "注册" }
        };

        function translatePage(lang) {
            const t = translations[lang];
            document.getElementById('txt-title').innerText = t.title;
            document.getElementById('lbl-phone').innerText = t.phone;
            document.getElementById('lbl-pass').innerText = t.pass;
            document.getElementById('lbl-confirm').innerText = t.confirm;
            document.getElementById('lbl-invite').innerText = t.invite;
            document.getElementById('txt-policy').innerText = t.policy;
            document.getElementById('nav-login').innerText = t.login;
            document.getElementById('nav-reg').innerText = t.reg;
            document.dir = (lang === 'ar') ? 'rtl' : 'ltr';
        }

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const invite = urlParams.get('invite');
            if (invite) document.getElementById('invite_code').value = invite;
        }
    </script>
</body>
</html>
