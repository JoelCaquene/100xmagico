{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - 100xMágico</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Poppins:wght@400;600&family=Noto+Sans+SC:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>
        :root { --gold: #ffcf40; --red: #ff002b; --bg: #0d0d0d; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: radial-gradient(circle at 50% 0%, #500 0%, #000 100%); 
            color: #fff; 
            min-height: 100vh; /* Permite que a página estique em ecrãs pequenos */
            overflow-y: auto;  /* Habilita o scroll vertical se o teclado tapar os botões */
            display: flex; 
            flex-direction: column;
        }

        /* HEADER */
        .top-nav { padding: 10px 15px; display: flex; flex-direction: column; align-items: center; }
        
        .lang-container {
            align-self: flex-end; background: rgba(0,0,0,0.5); border: 1px solid var(--gold);
            border-radius: 20px; padding: 2px 10px; display: flex; align-items: center;
        }
        .lang-container select { 
            background: transparent; border: none; color: var(--gold); font-size: 12px; 
            font-weight: bold; outline: none; padding: 2px;
        }

        .logo-box { text-align: center; margin-top: -10px; }
        .logo-main { 
            font-family: 'Cinzel', serif; font-size: 32px; color: var(--gold); 
            text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(255,207,64,0.5);
        }
        .logo-cn { font-family: 'Noto Sans SC', sans-serif; color: var(--red); font-size: 10px; letter-spacing: 5px; }

        /* LOGIN CARD */
        .login-card {
            flex: 1; width: 92%; max-width: 380px; margin: 20px auto;
            background: rgba(20, 20, 20, 0.95); border: 1px solid rgba(255,207,64,0.3);
            border-radius: 25px; padding: 30px 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            display: flex; flex-direction: column; gap: 20px;
        }

        h2 { font-size: 18px; text-align: center; color: #fff; text-transform: uppercase; letter-spacing: 2px; }

        .input-row {
            display: flex; align-items: center; background: #1a1a1a; 
            border: 1px solid #333; border-radius: 12px; height: 55px; overflow: hidden;
        }
        .input-row:focus-within { border-color: var(--gold); }
        .input-row i { width: 45px; text-align: center; color: var(--gold); font-size: 18px; }

        /* ANTI-WHITE AUTOFILL */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus {
            -webkit-text-fill-color: white !important;
            -webkit-box-shadow: 0 0 0px 1000px #1a1a1a inset !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        input {
            flex: 1; background: transparent !important; border: none; color: #fff;
            padding: 10px; font-size: 15px; outline: none; width: 100%;
        }

        .ddi-box { padding: 0 10px; border-right: 1px solid #333; color: #fff; font-weight: bold; }
        .ddi-box select { background: transparent; border: none; color: #fff; font-weight: bold; outline: none; }

        .eye-btn { padding: 0 15px; color: #555; cursor: pointer; }

        /* ERROS DO DJANGO */
        .errorlist {
            list-style: none; color: #ff4d4d; font-size: 12px; text-align: center;
            background: rgba(255,0,0,0.1); padding: 10px; border-radius: 10px;
        }

        /* FOOTER NAV */
        .footer-nav {
            background: #000; padding: 15px; display: flex; gap: 10px;
            border-top: 1px solid rgba(255,207,64,0.2);
            margin-top: auto; /* Empurra o rodapé para a extremidade inferior da tela */
        }

        .btn-reg-link {
            width: 80px; height: 55px; background: #1a1a1a; border: 1px solid #333;
            border-radius: 15px; color: #fff; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-decoration: none; font-size: 9px; font-weight: bold;
        }
        .btn-login-submit {
            flex: 1; background: linear-gradient(45deg, #d90429, #ff4d4d);
            border: none; border-radius: 15px; color: #fff; font-weight: 900;
            font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 10px;
            cursor: pointer;
        }

        /* LOADER */
        #loader {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

<div id="loader">
    <i class="fa-solid fa-dragon fa-spin-pulse" style="font-size: 50px; color: var(--gold);"></i>
    <div id="perc" style="margin-top: 20px; font-weight: 900; color: var(--gold); font-size: 20px;">0%</div>
</div>

<nav class="top-nav">
    <div class="lang-container">
        <i class="fa-solid fa-globe"></i>
        <select id="lang-select" onchange="updateLang()">
            <option value="pt">PT</option>
            <option value="en">EN</option>
            <option value="zh">ZH</option>
        </select>
    </div>
    <div class="logo-box">
        <div class="logo-main">100xMágico</div>
        <div class="logo-cn">百倍魔法</div>
    </div>
</nav>

<div class="login-card">
    <h2 id="t-title">Acesse sua Conta</h2>

    {% if form.non_field_errors %}
    <div class="errorlist">
        {% for error in form.non_field_errors %}
            <p>{{ error }}</p>
        {% endfor %}
    </div>
    {% endif %}
    
    <form method="post" id="loginForm">
        {% csrf_token %}
        <div class="input-row">
            <div class="ddi-box">
                <select name="ddi">
                    <option value="+55">BR</option>
                    <option value="+351">PT</option>
                    <option value="+244">AO</option>
                </select>
            </div>
            <input type="tel" name="username" id="p-phone" placeholder="Telemóvel" required>
        </div>

        <div class="input-row" style="margin-top:15px">
            <i class="fa-solid fa-lock"></i>
            <input type="password" name="password" id="pass" placeholder="Senha" required>
            <i class="fa-solid fa-eye eye-btn" onclick="toggle('pass')"></i>
        </div>

        <div style="text-align: right; margin-top: 10px;">
            <a href="#" style="color: var(--gold); font-size: 11px; text-decoration: none; opacity: 0.8;">Esqueceu a senha?</a>
        </div>
    </form>
</div>

<div class="footer-nav">
    <a href="{% url 'cadastro' %}" class="btn-reg-link">
        <i class="fa-solid fa-user-plus" style="font-size: 18px; margin-bottom: 2px;"></i>
        <span>CRIAR CONTA</span>
    </a>
    <button type="button" class="btn-login-submit" onclick="submitLogin()">
        <span id="t-btn">ENTRAR AGORA</span>
        <i class="fa-solid fa-right-to-bracket"></i>
    </button>
</div>

<script>
    // Sistema de Idiomas
    const texts = {
        pt: { title: "Acesse sua Conta", phone: "Telemóvel", pass: "Senha", btn: "ENTRAR AGORA", reg: "CRIAR CONTA" },
        en: { title: "Login to Account", phone: "Mobile Number", pass: "Password", btn: "LOGIN NOW", reg: "REGISTER" },
        zh: { title: "登录您的账户", phone: "手机号码", pass: "密码", btn: "立即登录", reg: "创建账号" }
    };

    function updateLang() {
        const l = document.getElementById('lang-select').value;
        document.getElementById('t-title').innerText = texts[l].title;
        document.getElementById('p-phone').placeholder = texts[l].phone;
        document.getElementById('pass').placeholder = texts[l].pass;
        document.getElementById('t-btn').innerText = texts[l].btn;
        document.querySelector('.btn-reg-link span').innerText = texts[l].reg;
    }

    // Loader inicial
    window.onload = () => {
        let c = 0;
        let i = setInterval(() => {
            c += Math.floor(Math.random() * 15) + 5;
            if(c >= 100) {
                clearInterval(i);
                document.getElementById('perc').innerText = "100%";
                setTimeout(() => document.getElementById('loader').style.display = 'none', 200);
            } else { document.getElementById('perc').innerText = c + "%"; }
        }, 40);
    };

    function toggle(id) {
        const x = document.getElementById(id);
        x.type = x.type === "password" ? "text" : "password";
        event.currentTarget.classList.toggle('fa-eye');
        event.currentTarget.classList.toggle('fa-eye-slash');
    }

    function submitLogin() {
        const form = document.getElementById('loginForm');
        if(form.reportValidity()) {
            document.querySelector('.btn-login-submit').innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
            form.submit();
        }
    }
</script>

</body>
</html>
