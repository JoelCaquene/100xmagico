{% extends "base.html" %}
{% load static %}

{% block title %}Planos e Funções - 100xmagico{% endblock %}

{% block content %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">

<div class="gallery-wrapper">
    
    <div class="gallery-top-bar">
        <a href="{% url 'home' %}" class="btn-back">
            <i class="fas fa-arrow-left"></i> VOLTAR
        </a>
        <div class="top-label">TABELA DE RENDIMENTOS</div>
    </div>

    <div class="cards-container">
        
        <!-- CARD 1: PLANOS DE RECARGA -->
        <section class="image-card">
            <div class="card-header">
                <div class="title-group">
                    <i class="fas fa-wallet"></i>
                    <h2>PLANOS DE RECARGA</h2>
                </div>
                <div class="action-buttons">
                    <button onclick="viewImage('{% static 'images/image_0cc337.png' %}')" class="btn-action shadow" title="Expandir">
                        <i class="fas fa-expand"></i>
                    </button>
                    <a href="{% static 'images/image_0cc337.png' %}" download="Recarga_100xmagico" class="btn-action shadow" title="Baixar">
                        <i class="fas fa-download"></i>
                    </a>
                </div>
            </div>
            <div class="image-frame">
                <img src="{% static 'images/image_0cc337.png' %}" alt="Planos de Recarga" class="long-image">
            </div>
        </section>

        <!-- CARD 2: PLANOS DE FUNÇÃO -->
        <section class="image-card">
            <div class="card-header">
                <div class="title-group">
                    <i class="fas fa-briefcase"></i>
                    <h2>PLANOS DE FUNÇÃO</h2>
                </div>
                <div class="action-buttons">
                    <button onclick="viewImage('{% static 'images/image_0c3c39.png' %}')" class="btn-action shadow" title="Expandir">
                        <i class="fas fa-expand"></i>
                    </button>
                    <a href="{% static 'images/image_0c3c39.png' %}" download="Funcao_100xmagico" class="btn-action shadow" title="Baixar">
                        <i class="fas fa-download"></i>
                    </a>
                </div>
            </div>
            <div class="image-frame">
                <img src="{% static 'images/image_0c3c39.png' %}" alt="Planos de Função" class="long-image">
            </div>
        </section>

    </div>
</div>

<!-- Modal Lightbox -->
<div id="imageModal" class="modal-overlay" onclick="closeModal()">
    <span class="close-modal">&times;</span>
    <img class="modal-content" id="fullImage">
</div>

<style>
    /* Bloqueio de rolagem horizontal e estabilidade */
    html, body {
        width: 100%;
        margin: 0;
        padding: 0;
        overflow-x: hidden; /* Remove rolagem lateral */
        background-color: #ffffff; /* Fundo branco para brilho */
        color: #333;
        font-family: 'Inter', sans-serif;
    }

    .gallery-wrapper {
        width: 100%;
        max-width: 500px; /* Estreito para focar na verticalidade */
        margin: 0 auto;
        padding: 0 10px 60px 10px;
        box-sizing: border-box;
    }

    .gallery-top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 5px;
        margin-bottom: 20px;
    }

    .btn-back {
        color: #000;
        text-decoration: none;
        font-weight: 700;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .top-label {
        font-size: 10px;
        font-weight: 800;
        color: #999;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .cards-container {
        display: flex;
        flex-direction: column;
        gap: 25px;
        width: 100%;
    }

    .image-card {
        background: #f8f9fa; /* Cinza claríssimo para destacar do branco */
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid #eee;
        width: 100%;
        box-sizing: border-box;
    }

    .card-header {
        padding: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #fff;
        border-bottom: 1px solid #f0f0f0;
    }

    .title-group { display: flex; align-items: center; gap: 8px; }
    .title-group i { color: #fbc02d; font-size: 16px; }
    .title-group h2 { font-family: 'Montserrat', sans-serif; font-size: 13px; margin: 0; color: #000; }

    .action-buttons { display: flex; gap: 8px; }

    .btn-action {
        background: #000;
        color: #fff;
        border: none;
        width: 32px;
        height: 32px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 14px;
    }

    .shadow { box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

    .image-frame {
        width: 100%;
        background: #fff;
        display: flex;
        justify-content: center;
    }

    .long-image {
        max-width: 100%;
        height: auto;
        display: block;
    }

    /* Modal Estilizado */
    .modal-overlay {
        display: none;
        position: fixed;
        z-index: 2000;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.95);
        align-items: center;
        justify-content: center;
    }

    .modal-content {
        max-width: 95%;
        max-height: 90%;
        object-fit: contain;
        animation: zoom 0.3s ease;
    }

    .close-modal {
        position: absolute;
        top: 20px;
        right: 25px;
        color: #fff;
        font-size: 35px;
        cursor: pointer;
    }

    @keyframes zoom { from {transform: scale(0.8); opacity: 0;} to {transform: scale(1); opacity: 1;} }
</style>

<script>
    function viewImage(src) {
        const modal = document.getElementById("imageModal");
        const modalImg = document.getElementById("fullImage");
        modal.style.display = "flex";
        modalImg.src = src;
        // Previne rolagem do fundo quando aberto
        document.body.style.overflow = "hidden";
    }

    function closeModal() {
        document.getElementById("imageModal").style.display = "none";
        document.body.style.overflow = "auto";
    }
</script>
{% endblock %}
